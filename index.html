<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>중소벤처기업부 청년인턴 공직 성향 진단 시스템</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* 중소벤처기업부 오피셜 아이덴티티 및 모던 토스 UX/UI 시스템 */
        :root {
            --gok-blue: #003764;      /* 메인 청색 */
            --gok-red: #e4032e;       /* 포인트 적색 */
            --gok-green: #008453;     /* 중기부 상생/녹색 포인트 */
            --gok-gray: #575757;      /* 정부회색 */
            --toss-light-blue: #edf4fa;
            --text-main: #191f28;
            --text-sub: #4e5968;
            --text-desc: #8b95a1;
            --border-line: #eceff2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: #f2f4f6;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        /* 스마트폰 최적화 가변 프레임 */
        .app-frame {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px; 
            min-height: calc(100vh - 24px); 
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(0, 55, 100, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-line);
            transition: max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 고정 헤더 */
        .app-header {
            padding: 18px 20px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            border-bottom: 1px solid var(--border-line);
            background: #ffffff;
            user-select: none;
        }

        .logo-image-area {
            height: 38px; 
            display: flex;
            align-items: center;
            cursor: pointer; 
        }

        .logo-image-area img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        /* 모바일 최적화 뷰 콘텐츠 패딩 */
        .view-content {
            padding: 28px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .panel {
            display: none;
            flex-direction: column;
            height: 100%;
            flex-grow: 1;
        }

        .panel.active {
            display: flex;
        }

        /* 타이포그래피 모바일 스케일링 */
        .headline {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            letter-spacing: -0.4px;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .lead {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-sub);
            margin-bottom: 30px;
        }

        /* 하단 고정형 터치 버튼 */
        .action-btn {
            background-color: var(--gok-blue);
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            margin-top: auto; 
        }

        /* 진행 인디케이터 및 상단 제어바 */
        .quiz-control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .back-btn {
            background: none;
            border: 1px solid var(--border-line);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .back-btn:hover {
            background-color: #f8f9fa;
        }

        .track {
            background-color: var(--border-line);
            height: 4px;
            border-radius: 2px;
            margin-bottom: 32px;
        }

        .fill {
            background-color: var(--gok-green);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        /* 모바일 전용 원터치 카드 */
        .card-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-card {
            background-color: #f8f9fa;
            border: 1px solid transparent;
            padding: 18px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 14px;
            line-height: 1.5;
            font-weight: 600;
            color: var(--text-main);
            transition: all 0.15s;
        }

        .option-card:hover, .option-card:active {
            background-color: #ffffff;
            border-color: var(--gok-blue);
            box-shadow: 0 4px 12px rgba(0, 55, 100, 0.04);
        }

        /* 결과 화면 디자인 */
        .badge {
            align-self: flex-start;
            background-color: #e6f6f0;
            color: var(--gok-green);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .divider {
            height: 1px;
            background-color: var(--border-line);
            margin: 24px 0;
        }

        .match-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rel-card {
            padding: 16px;
            border-radius: 12px;
            border-left: 4px solid transparent;
        }
        .rel-card.good { background-color: #f2f8ff; border-left-color: var(--gok-blue); }
        .rel-card.bad { background-color: #fff5f5; border-left-color: var(--gok-red); }

        .rel-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .rel-card.good .rel-title { color: var(--gok-blue); }
        .rel-card.bad .rel-title { color: var(--gok-red); }
        .rel-desc { font-size: 12.5px; line-height: 1.5; color: var(--text-sub); }

        /* 대시보드 무대 연출 레이아웃 */
        .admin-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: #ffffff;
            border: 1px solid var(--border-line);
            padding: 16px;
            border-radius: 12px;
        }

        .metric-label { font-size: 12px; color: var(--text-desc); margin-bottom: 4px; font-weight: 600; }
        .metric-value { font-size: 22px; font-weight: 800; color: var(--gok-blue); }

        .screen-dashboard-layout {
            display: grid;
            grid-template-columns: 1.2fr 1.8fr;
            gap: 20px;
            height: 380px;
        }

        .scr-chart-zone {
            border: 1px solid var(--border-line);
            padding: 16px;
            border-radius: 12px;
            overflow-y: auto;
            background: #ffffff;
        }

        .scr-desc-zone {
            background-color: #f8f9fa;
            border: 1px solid var(--border-line);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .scr-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
        }
        .scr-row.selected { background-color: var(--toss-light-blue); }

        .scr-label { width: 140px; font-size: 12px; font-weight: 700; }
        .scr-bar-bg { flex-grow: 1; background: #edf1f5; height: 12px; border-radius: 6px; overflow: hidden; margin: 0 10px; }
        .scr-bar-fill { background: var(--gok-blue); height: 100%; width: 0%; transition: width 0.3s; }
        .scr-val { width: 35px; font-size: 12px; font-weight: 700; text-align: right; }

        .desc-placeholder { text-align: center; color: var(--text-desc); font-size: 14px; font-weight: 600; }

        .reset-action-btn {
            background-color: #fff5f5;
            color: var(--gok-red);
            border: 1px solid rgba(228, 3, 46, 0.2);
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 14px;
            transition: all 0.2s;
        }
        .reset-action-btn:hover {
            background-color: var(--gok-red);
            color: #ffffff;
        }
    </style>
</head>
<body>

<div id="main-frame" class="app-frame">
    <header class="app-header">
        <div class="logo-image-area" onclick="triggerHiddenAdmin()">
            <img src="1.중소벤처기업부_국_가로.jpg" alt="중소벤처기업부">
        </div>
    </header>

    <div class="view-content">
        <div id="panel-intro" class="panel active">
            <h1 class="headline" style="color: var(--gok-blue); font-size: 24px;">나의 공직 실무 성향은<br>어떤 모습일까요?</h1>
            <p class="lead">중소벤처기업부 인턴십 과정에서 발현될 나만의 진짜 일 처리 스타일을 확인해보세요.</p>
            <button class="action-btn" onclick="switchView('panel-quiz')">진단 시작하기</button>
        </div>

        <div id="panel-quiz" class="panel">
            <div class="quiz-control-bar">
                <div style="font-size: 13px; font-weight: 600; color: var(--text-sub);">문항 (<span id="quiz-progress-text">1</span>/15)</div>
                <button class="back-btn" onclick="goToPrevQuestion()">이전</button>
            </div>
            <div class="track">
                <div id="fill-bar" class="fill"></div>
            </div>
            <h2 id="quiz-title" class="headline" style="font-size: 17px; margin-bottom: 24px; min-height: 50px;">문항 로딩 중...</h2>
            <div class="card-group">
                <div id="ansA" class="option-card" onclick="processAnswer('A')">선택지 A</div>
                <div id="ansB" class="option-card" onclick="processAnswer('B')">선택지 B</div>
            </div>
        </div>

        <div id="panel-result" class="panel">
            <div id="res-code" class="badge">실무 성향 분석 결과</div>
            <h1 id="res-title" class="headline" style="font-size: 22px; margin-bottom: 6px;">유형 로딩 중...</h1>
            <p id="res-line" class="lead" style="color: var(--gok-blue); font-weight: 700; margin-bottom: 16px;"></p>
            <p id="res-full" class="lead" style="font-size: 13.5px; margin-bottom: 0; color: var(--text-sub); line-height: 1.6; white-space: pre-wrap;"></p>
            
            <div class="divider"></div>
            
            <h2 class="headline" style="font-size: 15px; margin-bottom: 12px;">인턴 협업 밸런스 가이드</h2>
            <div class="match-grid">
                <div class="rel-card good">
                    <div id="card-good-title" class="rel-title">🤝 찰떡 파트너</div>
                    <div id="card-good-desc" class="rel-desc" style="white-space: pre-wrap;"></div>
                </div>
                <div class="rel-card bad">
                    <div id="card-bad-title" class="rel-title">⚠️ 스파크 파트너</div>
                    <div id="card-bad-desc" class="rel-desc" style="white-space: pre-wrap;"></div>
                </div>
            </div>
            <button class="action-btn" style="background-color: #edf1f5; color: var(--text-sub); margin-top: 24px; box-shadow: none;" onclick="location.reload()">다시 진단하기</button>
        </div>

        <div id="panel-admin" class="panel">
            <h1 class="headline" style="font-size: 20px; margin-bottom: 4px; color: var(--gok-blue);">실시간 검사 현황 브리핑</h1>
            <p class="lead" style="margin-bottom: 18px; font-size: 13px;">유형 리스트를 클릭하시면 심층 해설지가 우측 스크린에 대형 출력됩니다.</p>
            
            <div class="admin-metrics">
                <div class="metric-card">
                    <div class="metric-label">현재 참여 완료자</div>
                    <div id="m-total" class="metric-value">0명</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">기수 내 대세 성향</div>
                    <div id="m-trend" class="metric-value" style="font-size: 15px; margin-top: 4px; color: var(--gok-green);">데이터 수집 중</div>
                </div>
            </div>

            <div class="screen-dashboard-layout">
                <div id="scr-chart" class="scr-chart-zone"></div>
                <div id="scr-desc" class="scr-desc-zone">
                    <div class="desc-placeholder">좌측의 인턴 유형을 선택하시면<br>대형 브리핑 카드가 활성화됩니다.</div>
                </div>
            </div>
            <button class="reset-action-btn" onclick="clearMockDatabase()">대시보드 누적 데이터 전체 초기화</button>
            <button class="action-btn" style="background-color: var(--text-main); margin-top: 14px;" onclick="exitAdminPanel()">테스트 메인으로 복귀</button>
        </div>
    </div>
</div>

<script>
    // 파이어베이스 초기화 (보안 규칙 걱정 없는 무료 실시간 DB 프리티어 연결 세팅)
    const firebaseConfig = {
        databaseURL: "https://mss-intern-mbti-default-rtdb.firebaseio.com"
    };
    
    // 파이어베이스 앱 및 실시간 DB 서비스 연결
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const dbRef = database.ref('mbti_results');

    // 오타 코드 완벽 수정본 (EI: 5, SN: 5, TF: 5)
    const questions = [
        { 
            type: 'EI', 
            q: '인턴 기수 전체가 모인 세미나실, 강사가 "의견 있으신 분 손들고 말씀해 달라"고 한다면?', 
            a: '생각이 완벽히 정리되지 않았어도 마이크를 잡고 이야기를 뱉으면서 논리를 확장해 나간다.', 
            b: '머릿속으로 완벽한 문장 구조를 끝까지 다듬은 뒤, 정말 확신이 서거나 질문이 끝난 후 조용히 제출한다.' 
        },
        { 
            type: 'EI', 
            q: '동기가 "인턴십 끝나고 다 같이 제주도 종강 여행 가자"고 대형 프로젝트를 단톡방에 던졌다면?', 
            a: '대박 무조건 가야지! 하며 즉시 비행기 표나 숙소 링크를 마구 퍼오며 텐션을 올린다.', 
            b: '단톡방 대화 속도를 조용히 지켜보다가, 구체적인 예산이나 일정이 어느 정도 픽스되면 참여 여부를 알린다.' 
        },
        { 
            type: 'EI', 
            q: '매일 출근하는 부서 내 내 책상의 물리적 환경 중 내가 더 편안하게 느끼는 배치는?', 
            a: '동기들과 고개를 돌리면 언제든 소통할 수 있고 파티션이 비교적 낮아 탁 트인 개방형 자리', 
            b: '구석 모퉁이에 있어서 등 뒤로 사람들이 지나다니지 않고 모니터가 완벽히 보호되는 요새형 자리' 
        },
        { 
            type: 'EI', 
            q: '부서 실무 중 스트레스가 극에 달했을 때, 나도 모르게 취하게 되는 본능적인 행동은?', 
            a: '동기에게 메신저 창을 켜서 속사포 텍스트로 상황을 털어놓거나 전화를 걸어 수다를 떨어야 풀린다.', 
            b: '메신저 알림을 잠시 끄고, 혼자 타이핑을 치거나 커피 한 잔을 마시며 고독을 즐겨야 풀린다.' 
        },
        { 
            type: 'EI', 
            q: '부서 점심시간, 과장님이 "다 같이 새로 생긴 핫한 연돈 맛집 갈까?"라고 하신다면?', 
            a: '부서 선배들과 섞여 앉아 새로운 화제로 수다를 떨며 밥을 먹는 자리가 어색하지 않고 즐겁다.', 
            b: '밥이 입으로 들어가는지 코로 들어가는지 모를 정도로 신경 쓰여서, 차라리 마음 편한 동기들끼리 먹고 싶다.' 
        },
        { 
            type: 'SN', 
            q: '부서 사수 주무관님이 나를 평가할 때, 어떤 문장에 더 기분이 좋을까?', 
            a: 'ㅇㅇ 인턴은 붙임성이 좋고 리액션이 훌륭해서 부서 분위기가 확 사네!', 
            b: 'ㅇㅇ 인턴은 진중하고 침착해서 어떤 복잡한 일을 맡겨도 마음이 아주 놓여!' 
        },
        { 
            type: 'SN', 
            q: '사수 주무관님이 "이번 청년인턴 실무 가이드를 제작할 건데 자율적으로 해봐"라며 백지 양식을 줬을 때?', 
            a: '아무 가이드라인이 없어서 오히려 막막하고 스트레스를 받는다. 차라리 정형화된 서식을 지정해 주면 좋겠다.', 
            b: '내 맘대로 목차를 구성하고 디자인 레이아웃을 짤 수 있는 완벽한 자유도가 주어져 도파민이 돌고 신난다.' 
        },
        { 
            type: 'SN', 
            q: '새로운 주간 기안문이나 보고서 작성 미션을 받았을 때 나의 첫 접근법은?', 
            a: '이전 기수 선배 인턴들이 작성했던 검증된 기존 합격 문서 양식과 과거 추진 팩트 수치부터 꼼꼼히 수집한다.', 
            b: '이번 보고서가 지향해야 할 새로운 청년 정책의 트렌드와 거시적인 방향성, 비전 슬로건 아이디어부터 구상한다.' 
        },
        { 
            type: 'SN', 
            q: '아이디어 회의 중 동기가 현실성 없는 다소 파격적이고 힙한 제안을 던졌을 때 내 머릿속 생각은?', 
            a: '아이디어는 신선하지만, 현재 책정된 예산이나 관련 내부 규정상 현실적으로 집행이 불가능해 보인다.', 
            b: '현실적인 제약은 나중에 맞추면 되니, 이 참신한 콘셉트를 어떻게 더 파격적으로 발전시킬 수 있을지 흥미가 생긴다.' 
        },
        {

            matchBody: "조의 리더로서 머리 아픈 타 부서 전화 통화와 대외적 조율 스피치를 총대 매고 완벽히 전담해 주고, 나에게는 명확한 마감 기한과 원천 수치 데이터만 딱 전달해 주어 내 서류 작성 장인 정신을 200% 발휘하게 해주는 최고의 파트너입니다.", 
            clash: "트렌디 홍보 크리에이터", 
            clashBody: "밤새 자간 1% 단위까지 정밀 교정해서 구조를 완성해 놓은 최종 결재 보고서 양식이 있는데, 마감 10분 전에 찾아와 '요즘 유행 콘셉트는 이게 아니니 표를 다 지우고 감성 숏폼 스타일로 바꾸자'라며 즉즉 수정안을 던질 때 내면의 평화가 와르르 파괴됩니다." 
        },
        "CFE": { 
            title: "PRO 서포터 묵묵이", 
            line: "조원들의 등 뒤에서 아무도 모르게 평화와 멘탈을 수호합니다.", 
            desc: "● 실무 스타일\n자신을 과시하며 무대 위 스포트라이트를 받는 전방 포지션은 극도로 사양하지만, 팀이 정한 마일스톤 일정을 칼같이 준수하며 아무도 안 하려는 귀찮은 부록 자료 정리와 증빙 서류 철을 도맡아 하는 공직 사회의 참된 소금 같은 존재입니다.\n\n● 사수들의 막후 평판\n'ㅇㅇ 인턴은 평소엔 조용해서 있는 듯 없는 듯한데, 막상 미션 끝나고 서류 묶인 거 보면 가장 까다로운 증빙 영수증 처리가 1원의 오차도 없이 단단하게 완비되어 있다'며 칭찬을 아끼지 않습니다.\n\n● 카타르시스 모먼트\n조원들이 회의하다 의견이 조율되지 않아 단톡방이 험악하게 얼어붙었을 때, 뒤로 슬그머니 '마음고생 많으시죠, 기운 내요'라며 비타민 음료 기프티콘과 따뜻한 메시지를 보내 조용히 장내의 인류애를 심폐소생 시켰을 때 깊은 충만감을 느낍니다.\n\n● 전용 실무 치트키\n[Alt + Shift + L (한글 줄 간격 줄이기)] 와 [부서 소모품 보관함 위치 마스터 지도]", 
            match: "부서 소통 매니저",

            clash: "아이디어 빌드업 전략가", 
            clashBody: "현실화 가능성도 불투명하고 중기부 예산 규정에도 안 맞는 방대하고 거대한 국가적 거시 비전 정책을 쏟아내며, 나에게 밤새 끈질긴 추가 통계 서치와 무한 수정 수정을 지시해 내 소중한 멘탈 배터리를 방전시킬 때 멀리 도망치고 싶어집니다." 
        },
        "CVR": { 
            title: "독립 연구원", 
            line: "홀로 고독방을 파고들며 중기부 정책의 본질적 대안을 발굴합니다.", 
            desc: "● 실무 스타일\n지역 스타트업 규제 혁신 동향 분석 등 독립적인 몰입 공간과 긴 호흡의 시간만 주어지면, 타의 추종을 불허하는 깊이 있는 리서치 분석 결과물을 뽑아내는 고독한 천재형 씽커(Deep Thinker)입니다.\n\n● 사수들의 막후 평판\n'평소 부서 전체 회의에서는 영혼이 탈출한 눈으로 조용히 앉아 있어서 멍 때리는 줄 알았는데, 오후에 메일로 제출한 청년 정책 분석 리포트의 논리적 깊이와 논문 각주 수치들을 보고 과장님과 깜짝 놀랐다'는 평을 받습니다.\n\n● 카타르시스 모먼트\n사적인 잡담이나 의미 없는 스몰토크 메신저 알림을 완전히 차단한 채, 나 홀로 방대한 공직 이론과 데이터 팩트를 직조하여 보고서의 단단한 논리적 뼈대를 완벽한 구조물로 빌드업해 냈을 때 온몸에 소름이 돋는 지적 카타르시스를 느낍니다.\n\n● 전용 실무 치트키\n[Ctrl + F (찾아보기)] 와 [정부 국가통계포털(KOSIS) 정밀 필터링 스킬]", 
            match: "아이디어 빌드업 전략가", 
            matchBody: "서로 생각하는 기획의 도화지 스케일과 비전의 학술적 깊이가 막힘없이 통합니다. 내가 밤새 연구해 낸 고도화된 원천 리서치 데이터를 가장 세련된 발표용 카드뉴스와 스피치 멘트로 포장해 대외적으로 빛내줄 최고의 기획 파트너입니다.", 
            clash: "부서 소통 매니저", 
            clashBody: "한창 몰입해서 리포트 논리를 정밀하게 연결하고 있는데, 굳이 내 자리로 찾아와 '주말에 뭐 하셨어요? 커피 마시러 가요'라며 사생활 스몰토크를 걸거나 퇴근 후 단체 번개 회식을 압박하며 내 소중한 에너지 요새를 침범할 때 진심으로 방전됩니다." 
        },
        "CVE": { 
            title: "인류애 가득한 조력자", 
            line: "진심 어린 공감과 따뜻한 공공의 상생 가치를 실현합니다.", 
            desc: "● 실무 스타일\n중소벤처·소상공인 생태계의 상생 가치관과 동기 인턴십의 본질적 의미에 누구보다 진심인 정 많고 따뜻한 휴머니스트입니다. 조원이 실무에서 오타나 수식 오류로 대형 실수를 저질러 낙담하고 있으면, 냉정한 비난 대신 '처음엔 다 그래요, 해결책 같이 찾아봐요'라며 눈물겨운 공감으로 안아줍니다.\n\n● 사수들의 막후 평판\n'ㅇㅇ 인턴은 보고서를 작성할 때도 딱딱한 수치 나열만 하는 게 아니라, 정책을 통해 구제받을 전통시장 상인들의 실질적인 애환과 인간미 있는 스토리를 담아내어 문서 읽는 사람의 마음을 뭉클하게 움직인다'며 칭찬하십니다.\n\n● 카타르시스 모먼트\n단순히 점수를 잘 받는 것을 넘어, 우리 조가 기획한 소상공인 상생 아이디어가 현장 피드백에서 '진짜 현장의 아픔을 잘 알아줬다'는 감동적인 평가를 이끌어 냈을 때 눈시울이 붉어지는 최고의 직무 보람을 마주합니다.\n\n● 전용 실무 치트키\n[Alt + Shift + K (자간 넓히기)] 와 [소상공인 현장 애로사항 인터뷰 모음집]", 
            match: "트렌디 홍보 크리에이터", 
            matchBody: "생각의 제약을 두지 않는 자유로운 발상과 트렌디하고 따뜻한 안목을 아낌없이 지지해 주며, 경직된 공직 분위기 속에서 정서적으로 가장 완벽한 해방감과 위로를 공유할 수 있는 영혼의 단짝 소통 파트너입니다.", 
            clash: "실무 타임어택 해결사", 
            clashBody: "실수할 수도 있는 동기의 상처받은 마음이나 맥락은 완전히 무시한 채, 오직 '당장 5분 뒤 보고서 제출'과 차가운 데이터 수치 마감 레이스만 맹목적으로 밀어붙여 조직 분위기를 얼음장으로 만들 때 내적 염증을 느끼고 마음을 닫게 됩니다." 
        }
    };

    let idx = 0;
    let scores = { EI: 0, SN: 0, TF: 0 };
    let scoreHistory = []; 
    let clickCount = 0;
    let clickTimer = null;

    function triggerHiddenAdmin() {
        clickCount++;
        if (clickCount === 1) {
            clickTimer = setTimeout(() => { clickCount = 0; }, 1500); 
        }
        if (clickCount >= 3) {
            clearTimeout(clickTimer);
            clickCount = 0;
            toggleAdminPanel();
        }
    }

    function switchView(panelId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
        if(panelId === 'panel-quiz') loadQuestion();
    }

    function loadQuestion() {
        if (idx >= questions.length) {
            calculateResult();
            return;
        }
        const currentQ = questions[idx];
        document.getElementById('quiz-progress-text').innerText = idx + 1;
        document.getElementById('quiz-title').innerText = `${idx + 1}. ${currentQ.q}`;
        document.getElementById('ansA').innerText = currentQ.a;
        document.getElementById('ansB').innerText = currentQ.b;
        document.getElementById('fill-bar').style.width = (idx / questions.length) * 100 + '%';
    }

    function processAnswer(choice) {
        const currentQ = questions[idx];
        const point = (choice === 'A') ? 1 : -1;
        
        scoreHistory.push({ type: currentQ.type, point: point });
        scores[currentQ.type] += point;
        idx++;
        loadQuestion();
    }

    function goToPrevQuestion() {
        if (idx <= 0) {
            switchView('panel-intro');
            return;
        }
        idx--;
        const lastAction = scoreHistory.pop();
        if (lastAction) { scores[lastAction.type] -= lastAction.point; }
        loadQuestion();
    }

    function calculateResult() {
        switchView('panel-result');
        
        let mbti = "";
        mbti += (scores.EI >= 0) ? "O" : "C";
        mbti += (scores.SN >= 0) ? "F" : "V";
        mbti += (scores.TF >= 0) ? "R" : "E";

        const p = profiles[mbti];
        document.getElementById('res-code').innerText = "진단 완료";
        document.getElementById('res-title').innerText = p.title;
        document.getElementById('res-line').innerText = `"${p.line}"`;
        document.getElementById('res-full').innerText = p.desc;
        
        document.getElementById('card-good-title').innerText = "🤝 찰떡 파트너: " + p.match;
        document.getElementById('card-good-desc').innerText = p.matchBody;
        document.getElementById('card-bad-title').innerText = "⚠️ 스파크 파트너: " + p.clash;
        document.getElementById('card-bad-desc').innerText = p.clashBody;

        // 파이어베이스 실시간 데이터베이스로 즉시 전송
        dbRef.push(mbti);
    }

    function toggleAdminPanel() {
        const frame = document.getElementById('main-frame');
        frame.style.maxWidth = "1100px"; 
        switchView('panel-admin');
        
        // 실시간 수신 대기 (단 한 번 바인딩해 두면, 누군가 핸드폰으로 완료할 때마다 컴퓨터 화면 자동 갱신)
        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            let db = [];
            if(data) {
                // 파이어베이스에서 들어오는 객체 데이터를 배열로 안전하게 포맷팅
                db = Object.values(data);
            }
            drawScreenDashboard(db);
        });
    }

    function exitAdminPanel() {
        // 리스너 해제하여 메모리 관리
        dbRef.off();
        const frame = document.getElementById('main-frame');
        frame.style.maxWidth = "500px"; 
        switchView('panel-intro');
    }

    function clearMockDatabase() {
        if(confirm("현재까지 누적된 진단 데이터를 완전히 리셋하시겠습니까?")) {
            dbRef.set(null, (error) => {
                if(!error) {
                    alert("대시보드 데이터가 완전히 초기화되었습니다.");
                    document.getElementById('scr-desc').innerHTML = `<div class="desc-placeholder">좌측의 인턴 유형을 선택하시면<br>대형 브리핑 카드가 활성화됩니다.</div>`;
                }
            });
        }
    }

    function drawScreenDashboard(db) {
        // db가 비어있거나 null인 경우 빈 배열로 방어 코드 추가
        const safeDb = Array.isArray(db) ? db : [];
        document.getElementById('m-total').innerText = safeDb.length + "명";

        let counts = {};
        Object.keys(profiles).forEach(k => counts[k] = 0);
        safeDb.forEach(code => { if(counts[code] !== undefined) counts[code]++; });

        let max = -1, maxKey = "데이터 없음";
        Object.keys(counts).forEach(k => {
            if(counts[k] > max && counts[k] > 0) { max = counts[k]; maxKey = profiles[k].title; }
        });
        document.getElementById('m-trend').innerText = safeDb.length > 0 ? maxKey + ` (${max}명)` : "데이터 없음";

        const chartZone = document.getElementById('scr-chart');
        chartZone.innerHTML = "";

        // 데이터가 0명인 초기 상태에서도 8종의 유형 리스트가 무조건 화면에 출력되도록 수정 완료
        Object.keys(counts).forEach(key => {
            const cnt = counts[key];
            const pct = safeDb.length > 0 ? (cnt / safeDb.length) * 100 : 0;
            const row = document.createElement('div');
            row.className = "scr-row";
            row.id = `row-${key}`;
            row.innerHTML = `
                <div class="scr-label">${profiles[key].title}</div>
                <div class="scr-bar-bg"><div class="scr-bar-fill" style="width: ${pct}%"></div></div>
                <div class="scr-val">${cnt}명</div>
            `;
            row.onclick = () => focusTypeDescription(key);
            chartZone.appendChild(row);
        });
    }

    function focusTypeDescription(key) {
        document.querySelectorAll('.scr-row').forEach(r => r.classList.remove('selected'));
        const targetRow = document.getElementById(`row-${key}`);
        if(targetRow) targetRow.classList.add('selected');

        const p = profiles[key];
        const descZone = document.getElementById('scr-desc');
        descZone.innerHTML = `
            <div style="background-color: var(--gok-blue); color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight:700; align-self: flex-start; margin-bottom:12px;">심층 브리핑 카드</div>
            <h1 style="font-size: 24px; font-weight:800; color: var(--gok-blue); margin-bottom:8px;">${p.title}</h1>
            <p style="font-size: 14px; font-weight:700; color: var(--gok-green); margin-bottom:14px;">"${p.line}"</p>
            <p style="font-size: 13.5px; line-height:1.6; color: var(--text-sub); background:#fff; padding:14px; border-radius:10px; border:1px solid var(--border-line); margin-bottom:14px; white-space: pre-wrap;">${p.desc}</p>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div style="background:#f2f8ff; padding:10px; border-radius:8px; font-size:12px; white-space: pre-wrap;"><strong style="color:var(--gok-blue);">🤝 찰떡 파트너:</strong><br>${p.match}\n${p.matchBody}</div>
                <div style="background:#fff5f5; padding:10px; border-radius:8px; font-size:12px; white-space: pre-wrap;"><strong style="color:var(--gok-red);">⚠️ 스파크 파트너:</strong><br>${p.clash}\n${p.clashBody}</div>
            </div>
        `;
    }
</script>
